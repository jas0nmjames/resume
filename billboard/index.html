<!DOCTYPE html>

<!--
  ═══════════════════════════════════════════════════════════════
  Animated Billboard — jasonjames.design
  ═══════════════════════════════════════════════════════════════
  Each letter of "jasonjames.design" is an independently
  bouncing particle that randomly grows and shrinks, rendered
  with the full four-layer Bungee stacking effect.

  Text-measurement technique inspired by Pretext
  (https://github.com/chenglou/pretext) by Cheng Lou:
  a hidden <canvas> measures character width at any font size
  so layout math is pure arithmetic — no DOM reflow in the
  animation hot path.

  Created by  : Claude Sonnet 4.6  (claude-sonnet-4-6)
  Provider    : Anthropic          https://anthropic.com
  Interface   : Claude Code        https://claude.ai/claude-code
  Created     : 2026-03-30
  Updated     : 2026-03-30 — ordered initial layout, staggered
                physics launch, 60 s drag-freeze, delta-time
                animation loop, CSS scale compositing
  ═══════════════════════════════════════════════════════════════
-->

<html lang="en-US" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonjames.design — Animated Billboard</title>
    <meta name="author" content="Jason James" />

    <!-- ── Google Fonts preconnect ─────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter for UI chrome only; Bungee loaded from local files below -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet" />

    <style>
      /* ═══════════════════════════════════════════════════════
         Animated Billboard — styles
         Created by Claude Sonnet 4.6 · Anthropic · 2026-03-30
         ═══════════════════════════════════════════════════════ */

      /* ── Local Bungee Layers fonts ─────────────────────────
         Paths relative to billboard/index.html.
         Font files live in the parent repo's asset folder.   */
      @font-face {
        font-family: "Bungee Layers Inline";
        src:
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Inline.woff2") format("woff2"),
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Inline.woff")  format("woff");
        font-display: block;
      }
      @font-face {
        font-family: "Bungee Layers Regular";
        src:
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Regular.woff2") format("woff2"),
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Regular.woff")  format("woff");
        font-display: block;
      }
      @font-face {
        font-family: "Bungee Layers Outline";
        src:
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Outline.woff2") format("woff2"),
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Outline.woff")  format("woff");
        font-display: block;
      }
      @font-face {
        font-family: "Bungee Layers Shade";
        src:
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Shade.woff2") format("woff2"),
          url("../assets/fonts/bungee/Bungee_Web/BungeeLayers/BungeeLayers-Shade.woff")  format("woff");
        font-display: block;
      }
      @font-face {
        font-family: "Bungee";
        src:
          url("../assets/fonts/bungee/Bungee_Web/Bungee/Bungee-Regular.woff2") format("woff2"),
          url("../assets/fonts/bungee/Bungee_Web/Bungee/Bungee-Regular.woff")  format("woff");
        font-display: block;
      }

      /* ── Reset ───────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Stage ───────────────────────────────────────────── */
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background-color: #fafdfc;
      }
      #stage {
        position: relative;
        width: 100%; height: 100%;
      }

      /* ── Letter: base state ──────────────────────────────── */
      /* Each .letter is a CSS Grid that stacks all four Bungee
         layer spans in the same cell for the multilayer effect.

         `scale` is the CSS Individual Transform property
         (Chrome 104+ / Firefox 103+). It composes with the
         JS-driven `transform: translate()` so pop animations
         don't interfere with position.

         Performance notes (Claude Sonnet 4.6 · 2026-03-30):
         · will-change is NOT set here — applied dynamically
           only while a letter is actively moving, then removed,
           to avoid creating unnecessary compositor layers for
           all 17 elements at rest.
         · touch-action: none tells the browser the element
           handles all pointer gestures itself.                 */
      .letter {
        position: absolute;
        left: 0; top: 0;
        display: grid;
        cursor: grab;
        touch-action: none;
        user-select: none;
        line-height: 1;
        /* Start invisible; JS adds .visible with a stagger */
        opacity: 0;
        scale: 0.65;
        transition:
          opacity 0.45s ease-out,
          scale   0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Triggered by JS after initial layout is measured */
      .letter.visible {
        opacity: 1;
        scale: 1;
      }

      /* All four spans occupy the same grid cell */
      .letter > span {
        grid-row: 1;
        grid-column: 1;
        font-weight: 400;
        line-height: 1;
        display: block;
      }

      /* ── Bungee layer colours ─────────────────────────────── */
      .layer-inline  { z-index: 4; font-family: "Bungee Layers Inline",  "Bungee Hairline", cursive; color: #114B5F; }
      .layer-regular { z-index: 3; font-family: "Bungee Layers Regular", "Bungee",          cursive; color: #F4D06F; }
      .layer-outline { z-index: 2; font-family: "Bungee Layers Outline",                    cursive; color: #107091; }
      .layer-shade   { z-index: 1; font-family: "Bungee Layers Shade",                      cursive; color: #114B5F; }

      /* ── Drag state ───────────────────────────────────────── */
      /* Added/removed by Claude Sonnet 4.6 · Anthropic · 2026-03-30 */
      .letter.is-dragged {
        cursor: grabbing;
        z-index: 1000;
        transition: none; /* no scale/opacity transitions while dragging */
      }

      /* ── Launch pop: plays when a letter peels off into physics
         Uses CSS `scale` (separate from transform) so it
         composes cleanly with JS-driven translate().
         Created by Claude Sonnet 4.6 · Anthropic · 2026-03-30 */
      @keyframes letter-launch {
        0%   { scale: 1;    }
        40%  { scale: 1.28; }
        100% { scale: 1;    }
      }
      .letter.launching {
        animation: letter-launch 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        transition: none;
      }

      /* ── Navigation ──────────────────────────────────────── */
      #back-link {
        position: fixed; bottom: 1.25rem; left: 1.25rem; z-index: 200;
        font-family: "Inter", Helvetica, Arial, sans-serif;
        font-size: 0.875rem; font-weight: 300; color: #107091;
        text-decoration: none; opacity: 0.6;
        transition: opacity 0.2s ease;
      }
      #back-link:hover { opacity: 1; }

      /* ── Attribution ─────────────────────────────────────── */
      #attribution {
        position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 200;
        font-family: "Inter", Helvetica, Arial, sans-serif;
        font-size: 0.75rem; font-weight: 300; color: #107091;
        opacity: 0.45; text-align: right; pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="stage"></div>
    <a id="back-link" href="../index.html">← résumé</a>
    <p id="attribution">
      Animated by Claude Sonnet 4.6<br>
      Anthropic · Claude Code · 2026-03-30
    </p>

    <script>
      /**
       * ═══════════════════════════════════════════════════════
       * Animated Billboard — physics + interaction engine
       * ═══════════════════════════════════════════════════════
       *
       * Sequence
       * ────────
       * 1. Fonts load  → letters appear in reading order,
       *    staggered 80 ms apart (CSS opacity/scale transition).
       * 2. After 5 s   → letters launch into physics one at a
       *    time, 220 ms apart, with a brief pop animation.
       * 3. Flying       → each letter bounces, grows/shrinks
       *    randomly.  Physics is delta-time-scaled so it runs
       *    identically at 60 Hz and 120 Hz.
       * 4. Drag         → grab any letter; it follows the
       *    pointer.  Physics is suspended.
       * 5. Release      → letter freezes for 60 s (enough to
       *    compose a static arrangement), then resumes physics.
       * 6. Pinch/scroll → resize individual letters.
       *
       * Performance notes (Claude Sonnet 4.6 · 2026-03-30)
       * ─────────────────────────────────────────────────────
       * · Only `transform` and `font-size` are written to the
       *   DOM in the hot path; no layout properties are read
       *   (canvas measures character width instead — the
       *   Pretext insight: github.com/chenglou/pretext).
       * · Delta time: velocity is in px/frame@60fps but all
       *   position updates are multiplied by `dt` so the
       *   animation is frame-rate independent.
       * · `will-change: transform` is toggled on/off per
       *   particle — on when flying/dragging, off when frozen
       *   or arranged — to avoid wasting compositor memory on
       *   static elements.
       * · DOM writes are batched (all reads from canvas first,
       *   then all writes) to prevent layout thrashing.
       *
       * Created by : Claude Sonnet 4.6  (claude-sonnet-4-6)
       * Provider   : Anthropic          https://anthropic.com
       * Interface  : Claude Code        https://claude.ai/claude-code
       * Date       : 2026-03-30
       * ═══════════════════════════════════════════════════════
       */

      /* ── Constants ─────────────────────────────────────────── */
      const TEXT            = 'jasonjames.design';
      const MIN_SIZE        = 28;      // px
      const MAX_SIZE        = 140;     // px
      const ARRANGED_SIZE   = 72;      // px for initial static layout
      const BASE_SPEED      = 1.8;     // px/frame@60fps
      const DAMPING         = 0.9992;  // per-frame velocity decay
      const SIZE_LERP       = 0.022;   // exponential lerp rate (frame-independent below)
      const SIZE_SNAP       = 0.3;     // px — snap to target below this delta
      const LAUNCH_DELAY_MS = 5000;    // ms before first letter launches
      const LAUNCH_STAGGER  = 220;     // ms between consecutive launches
      const FREEZE_MS       = 60_000;  // ms a dropped letter stays frozen

      /* ── Canvas-based text measurement ─────────────────────────
         Inspired by Pretext: all layout math uses canvas metrics —
         the DOM is only written to, never read, in the hot path.  */
      const _mc  = document.createElement('canvas');
      const _mct = _mc.getContext('2d');

      /**
       * Returns the advance width of `char` rendered at `sizePx`
       * in Bungee Regular (all variants share the same metrics).
       * Zero DOM layout queries — pure canvas arithmetic.
       */
      function measureCharWidth(char, sizePx) {
        _mct.font = `400 ${sizePx}px "Bungee Layers Regular", Bungee, cursive`;
        return _mct.measureText(char).width;
      }

      /* ── DOM ────────────────────────────────────────────────── */
      const stage = document.getElementById('stage');

      function createLetterEl(char) {
        const el = document.createElement('div');
        el.className = 'letter';
        /* Layer order: shade → outline → regular → inline (z 1→4) */
        ['layer-shade', 'layer-outline', 'layer-regular', 'layer-inline'].forEach(cls => {
          const span = document.createElement('span');
          span.className = cls;
          span.textContent = char;
          el.appendChild(span);
        });
        stage.appendChild(el);
        return el;
      }

      /* ── Viewport ───────────────────────────────────────────── */
      let vw = window.innerWidth;
      let vh = window.innerHeight;

      window.addEventListener('resize', () => {
        vw = window.innerWidth;
        vh = window.innerHeight;
        /* Clamp out-of-bounds particles without killing velocity */
        for (const p of particles) {
          const w = measureCharWidth(p.char, p.size);
          if (p.x + w > vw) p.x = Math.max(0, vw - w);
          if (p.y + p.size > vh) p.y = Math.max(0, vh - p.size);
        }
      });

      /* ── Utilities ──────────────────────────────────────────── */
      const rand     = (lo, hi) => Math.random() * (hi - lo) + lo;
      const randSign = ()       => Math.random() < 0.5 ? 1 : -1;
      const clamp    = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

      /**
       * Frame-rate-independent exponential lerp.
       * At dt=1 (60 fps) this equals `value + (target-value)*rate`.
       * At higher frame rates the result is identical over real time.
       */
      const expLerp = (value, target, rate, dt) =>
        target + (value - target) * Math.pow(1 - rate, dt);

      /* ── Initial layout ─────────────────────────────────────── */
      /**
       * Computes the (x, y) arranged position for each character
       * so they spell out TEXT centred on screen.
       * Scales down font-size automatically if the line is too wide.
       *
       * Created by Claude Sonnet 4.6 · Anthropic · 2026-03-30
       *
       * @param {string[]} chars
       * @param {number}   targetSize  — desired font-size in px
       * @returns {{ x:number, y:number, size:number }[]}
       */
      function computeArrangedPositions(chars, targetSize) {
        /* Measure widths at target size */
        const rawWidths = chars.map(c => measureCharWidth(c, targetSize));
        const gap       = targetSize * 0.06; // small inter-letter spacing
        const rawTotal  = rawWidths.reduce((a, b) => a + b, 0) + gap * (chars.length - 1);

        /* Scale down if wider than 92 % of viewport */
        const maxW  = vw * 0.92;
        const scale = rawTotal > maxW ? maxW / rawTotal : 1;
        const size  = targetSize * scale;
        const ws    = rawWidths.map(w => w * scale);
        const total = ws.reduce((a, b) => a + b, 0) + gap * scale * (chars.length - 1);

        let x       = (vw - total) / 2;
        const y     = (vh - size)  / 2;

        return chars.map((_, i) => {
          const pos = { x, y, size };
          x += ws[i] + gap * scale;
          return pos;
        });
      }

      /* ── Particle factory ───────────────────────────────────── */
      /**
       * @param {string}      char
       * @param {HTMLElement} el
       * @param {number}      ax, ay   — arranged x/y
       * @param {number}      aSize    — arranged font-size
       * @param {number}      launchAt — performance.now() timestamp to launch
       */
      function createParticle(char, el, ax, ay, aSize, launchAt) {
        /* Write initial position before first tick so letters
           appear in the right place as soon as they're visible. */
        el.style.fontSize  = `${aSize}px`;
        el.style.transform = `translate(${ax}px, ${ay}px)`;

        return {
          char, el,
          x: ax, y: ay,
          vx: 0, vy: 0,
          size:       aSize,
          targetSize: aSize,
          /* sizeCountdown in ms — reset randomly each time     */
          sizeCountdown: rand(2000, 5000),
          /**
           * phase: 'arranged' → letter is static in reading order
           *        'flying'   → full physics
           *        'frozen'   → user dropped it; static for FREEZE_MS
           */
          phase:       'arranged',
          launchAt,          // performance.now() ms to start flying
          frozenUntil: 0,    // performance.now() ms when freeze ends
          /* Interaction state */
          dragged:     false,
          pinch:       null,  // { id1, id2, startDist, startSize }
          dragHistory: [],    // recent { x, y, t } for throw velocity
        };
      }

      /* ── Interaction: drag, pinch, scroll-zoom ──────────────── */
      /**
       * Attaches pointer + wheel event listeners to one particle.
       *
       * Design (Claude Sonnet 4.6 · Anthropic · 2026-03-30):
       * · Pointer Events unify mouse and touch into one handler.
       * · Two pointers on the same letter → pinch-to-resize.
       * · Mouse wheel / two-finger scroll → resize that letter.
       * · On release, velocity is zeroed and frozenUntil is set
       *   (no throw) so the letter stays exactly where placed.
       */
      const pointerMap = new Map(); // pointerId → { p, offsetX, offsetY, curX, curY }

      function attachInteraction(p) {
        const { el } = p;

        el.addEventListener('pointerdown', e => {
          e.preventDefault();
          el.setPointerCapture(e.pointerId);

          const partner = [...pointerMap.entries()].find(([, d]) => d.p === p);

          if (partner) {
            /* Second pointer on same letter → start pinch */
            const [, od] = partner;
            p.pinch = {
              id1:       partner[0],
              id2:       e.pointerId,
              startDist: Math.hypot(e.clientX - od.curX, e.clientY - od.curY) || 1,
              startSize: p.size,
            };
            p.dragged = false;
            el.classList.remove('is-dragged');
          } else {
            /* First pointer → drag */
            p.dragged     = true;
            p.vx          = 0; p.vy = 0;
            p.dragHistory = [];
            /* Suspend freeze timer while user is interacting */
            p.frozenUntil = 0;
            el.classList.add('is-dragged');
            el.style.setProperty('will-change', 'transform, font-size');
          }

          pointerMap.set(e.pointerId, {
            p,
            offsetX: e.clientX - p.x,
            offsetY: e.clientY - p.y,
            curX: e.clientX,
            curY: e.clientY,
          });
        });

        /* Scroll / two-finger trackpad → resize this letter only */
        el.addEventListener('wheel', e => {
          e.preventDefault();
          const delta  = e.deltaY < 0 ? 12 : -12;
          p.size       = clamp(p.size + delta, MIN_SIZE, MAX_SIZE);
          p.targetSize = p.size; // hold here; don't let auto-animation undo it
        }, { passive: false });
      }

      /* pointermove on document so drag works outside the element */
      document.addEventListener('pointermove', e => {
        const data = pointerMap.get(e.pointerId);
        if (!data) return;
        data.curX = e.clientX;
        data.curY = e.clientY;

        const { p } = data;

        if (p.pinch &&
            (e.pointerId === p.pinch.id1 || e.pointerId === p.pinch.id2)) {
          /* Pinch: scale size proportionally to finger distance */
          const d1 = pointerMap.get(p.pinch.id1);
          const d2 = pointerMap.get(p.pinch.id2);
          if (d1 && d2) {
            const dist   = Math.hypot(d1.curX - d2.curX, d1.curY - d2.curY) || 1;
            p.size       = clamp(p.pinch.startSize * dist / p.pinch.startDist, MIN_SIZE, MAX_SIZE);
            p.targetSize = p.size;
          }
        } else if (p.dragged) {
          const nx = e.clientX - data.offsetX;
          const ny = e.clientY - data.offsetY;
          p.dragHistory.push({ x: nx, y: ny, t: performance.now() });
          if (p.dragHistory.length > 8) p.dragHistory.shift();
          p.x = nx;
          p.y = ny;
        }
      });

      function onPointerRelease(e) {
        const data = pointerMap.get(e.pointerId);
        if (!data) return;
        const { p } = data;
        pointerMap.delete(e.pointerId);

        if (p.pinch &&
            (e.pointerId === p.pinch.id1 || e.pointerId === p.pinch.id2)) {
          p.pinch = null;
          el_freezeAfterInteraction(p);
        } else if (p.dragged) {
          p.dragged     = false;
          p.dragHistory = [];
          p.el.classList.remove('is-dragged');
          el_freezeAfterInteraction(p);
        }
      }

      /**
       * After a drag or pinch ends, freeze the letter in place
       * for FREEZE_MS milliseconds.  No throw velocity — the
       * whole point is to let the visitor compose a still
       * arrangement.  Physics and size-animation both pause.
       *
       * Created by Claude Sonnet 4.6 · Anthropic · 2026-03-30
       */
      function el_freezeAfterInteraction(p) {
        p.vx          = 0;
        p.vy          = 0;
        p.targetSize  = p.size; // hold current size during freeze
        p.phase       = 'frozen';
        p.frozenUntil = performance.now() + FREEZE_MS;
        /* Release compositor layer — frozen letters are static */
        p.el.style.removeProperty('will-change');
      }

      document.addEventListener('pointerup',     onPointerRelease);
      document.addEventListener('pointercancel', onPointerRelease);

      /* ── Particle array ─────────────────────────────────────── */
      let particles = [];
      let lastTimestamp = 0;

      /* ── Init ───────────────────────────────────────────────── */
      function init() {
        const chars    = [...TEXT];
        const now      = performance.now();
        const arranged = computeArrangedPositions(chars, ARRANGED_SIZE);

        particles = chars.map((char, i) => {
          const el      = createLetterEl(char);
          const { x, y, size } = arranged[i];
          const launchAt = now + LAUNCH_DELAY_MS + i * LAUNCH_STAGGER;
          const p        = createParticle(char, el, x, y, size, launchAt);
          attachInteraction(p);
          /* Stagger the initial appear transition — 80 ms apart */
          setTimeout(() => p.el.classList.add('visible'), 50 + i * 80);
          return p;
        });

        requestAnimationFrame(tick);
      }

      /* ── Animation loop ─────────────────────────────────────── */
      /**
       * Delta-time physics loop.
       *
       * `dt` normalises velocity to 60 fps regardless of actual
       * frame rate (120 Hz, 144 Hz, etc.) so the animation looks
       * identical on all displays.  Clamped to [0.1, 3] to handle
       * tab backgrounding and first-frame edge cases.
       *
       * Batch strategy: all canvas reads happen first (inside the
       * loop body, before DOM writes) so the browser never needs
       * to synchronously flush layout mid-loop.
       *
       * Created by Claude Sonnet 4.6 · Anthropic · 2026-03-30
       */
      function tick(timestamp) {
        const dt  = lastTimestamp
          ? clamp((timestamp - lastTimestamp) / 16.667, 0.1, 3)
          : 1;
        lastTimestamp = timestamp;

        for (const p of particles) {

          /* ── User-controlled: skip autonomous physics ─────── */
          if (p.dragged || p.pinch) {
            p.el.style.fontSize  = `${p.size}px`;
            p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
            continue;
          }

          /* ── Frozen: static in place ──────────────────────── */
          if (p.phase === 'frozen') {
            if (timestamp < p.frozenUntil) {
              continue; /* DOM already correct — no write needed */
            }
            /* Unfreeze: pick up from current position and resume */
            p.phase       = 'flying';
            p.vx          = rand(0.6, BASE_SPEED) * randSign();
            p.vy          = rand(0.6, BASE_SPEED) * randSign();
            p.targetSize  = rand(MIN_SIZE, MAX_SIZE);
            p.sizeCountdown = rand(2000, 5000);
            p.frozenUntil = 0;
            p.el.style.setProperty('will-change', 'transform, font-size');
          }

          /* ── Arranged: waiting for launch time ─────────────── */
          if (p.phase === 'arranged') {
            if (timestamp < p.launchAt) {
              continue; /* stay put — no write needed */
            }
            /* Launch! ── transition to physics */
            p.phase     = 'flying';
            p.vx        = rand(0.6, BASE_SPEED) * randSign();
            p.vy        = rand(0.6, BASE_SPEED) * randSign();
            p.targetSize = rand(MIN_SIZE, MAX_SIZE);
            p.sizeCountdown = rand(2000, 5000);
            p.el.style.setProperty('will-change', 'transform, font-size');
            /* Visual pop — uses CSS `scale` property so it
               composes with JS-driven `transform: translate()` */
            p.el.classList.add('launching');
            setTimeout(() => p.el.classList.remove('launching'), 600);
          }

          /* ── Flying: full delta-time physics ─────────────── */

          /* Size interpolation — frame-rate-independent lerp */
          const sizeDelta = p.targetSize - p.size;
          p.size = Math.abs(sizeDelta) < SIZE_SNAP
            ? p.targetSize
            : expLerp(p.size, p.targetSize, SIZE_LERP, dt);

          /* Pick new target size after countdown (in ms).
             dt * 16.667 === timestamp - lastTimestamp (elapsed ms).
             Using dt form keeps the arithmetic consistent.       */
          p.sizeCountdown -= dt * 16.667;
          if (p.sizeCountdown <= 0) {
            p.targetSize    = rand(MIN_SIZE, MAX_SIZE);
            p.sizeCountdown = rand(2000, 5000);
          }

          /* Canvas-measure bounds — no DOM reads */
          const charW = measureCharWidth(p.char, p.size);
          const charH = p.size; /* Bungee cap-height ≈ font-size at line-height:1 */

          /* Step position (delta-time scaled) */
          p.x  += p.vx * dt;
          p.y  += p.vy * dt;

          /* Frame-rate-independent damping */
          p.vx *= Math.pow(DAMPING, dt);
          p.vy *= Math.pow(DAMPING, dt);

          /* Bounce off viewport walls */
          if (p.x < 0)          { p.x = 0;          p.vx =  Math.abs(p.vx); }
          if (p.x + charW > vw) { p.x = vw - charW; p.vx = -Math.abs(p.vx); }
          if (p.y < 0)          { p.y = 0;           p.vy =  Math.abs(p.vy); }
          if (p.y + charH > vh) { p.y = vh - charH;  p.vy = -Math.abs(p.vy); }

          /* Restore minimum speed to prevent stalling */
          const spd = Math.hypot(p.vx, p.vy);
          if (spd < 0.35) {
            const angle = Math.random() * Math.PI * 2;
            p.vx = Math.cos(angle) * 0.9;
            p.vy = Math.sin(angle) * 0.9;
          }

          /* Write to DOM — only writes, zero reads */
          p.el.style.fontSize  = `${p.size}px`;
          p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
        }

        requestAnimationFrame(tick);
      }

      /* ── Boot ───────────────────────────────────────────────── */
      /* Wait for Bungee fonts so canvas measureText() is accurate */
      document.fonts.ready.then(init);

    </script>
  </body>
</html>
